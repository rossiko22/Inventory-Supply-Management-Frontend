# Single-host frontend for OpenShift.
#   /                -> shell SPA
#   /mf/<name>/...   -> each micro-frontend's built bundle (federation remotes)
#   /api/...         -> web-gateway (Spring Cloud Gateway), prefix stripped
#   /ws              -> notification-service WebSocket (upgraded)
# Uses port 8080 (nginx-unprivileged) so it runs under OpenShift's non-root UID.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20M;

    # Micro-frontend bundles (Module Federation remotes). Served as static files.
    location /mf/ {
        try_files $uri =404;
    }

    # REST API -> web gateway. Trailing slash strips the /api prefix so the
    # gateway sees /auth, /orders, /warehouses, ... (matches its route predicates).
    location /api/ {
        proxy_pass http://web-gateway:8080/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Notification WebSocket (live updates).
    location /ws {
        proxy_pass http://notification-service:9091;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;
    }

    # Shell SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
